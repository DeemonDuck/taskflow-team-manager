<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team - TaskFlow Team Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobile-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <a href="dashboard.html" class="brand">
                <div class="brand-icon">
                    <i class="bi bi-kanban-fill"></i>
                </div>
                <span class="brand-text">TaskFlow</span>
            </a>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <a href="dashboard.html" class="nav-link">
                    <i class="bi bi-grid-1x2-fill"></i>
                    <span>Dashboard</span>
                </a>
                <a href="projects.html" class="nav-link">
                    <i class="bi bi-folder"></i>
                    <span>Projects</span>
                </a>
                <a href="tasks.html" class="nav-link">
                    <i class="bi bi-check2-square"></i>
                    <span>Tasks</span>
                </a>
                <a href="team.html" class="nav-link active">
                    <i class="bi bi-people"></i>
                    <span>Team</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Account</div>
                <a href="#" class="nav-link" onclick="logout(); return false;">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar">AJ</div>
                <div class="user-info">
                    <div class="user-name">Alex Johnson</div>
                    <span class="user-role badge bg-danger">Admin</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="navbar-content">
                <div class="d-flex align-items-center">
                    <button class="nav-btn me-3 d-lg-none" onclick="toggleSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <div>
                        <h2 class="page-title">Team</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb">
                                <li class="breadcrumb-item"><a href="dashboard.html">Dashboard</a></li>
                                <li class="breadcrumb-item active">Team</li>
                            </ol>
                        </nav>
                    </div>
                </div>

                <div class="navbar-actions">
                    <button class="nav-btn" title="Notifications">
                        <i class="bi bi-bell"></i>
                        <span class="notification-badge">3</span>
                    </button>
                    <button class="nav-btn" title="Settings">
                        <i class="bi bi-gear"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Stats Row -->
            <div class="row mb-4">
                <div class="col-md-3 col-6 mb-3">
                    <div class="card stat-card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-primary-subtle text-primary me-3">
                                <i class="bi bi-people"></i>
                            </div>
                            <div>
                                <h4 class="mb-0" id="total-members">0</h4>
                                <small class="text-muted">Total Members</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 col-6 mb-3">
                    <div class="card stat-card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-danger-subtle text-danger me-3">
                                <i class="bi bi-shield"></i>
                            </div>
                            <div>
                                <h4 class="mb-0" id="admin-count">0</h4>
                                <small class="text-muted">Admins</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 col-6 mb-3">
                    <div class="card stat-card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-info-subtle text-info me-3">
                                <i class="bi bi-person"></i>
                            </div>
                            <div>
                                <h4 class="mb-0" id="member-count">0</h4>
                                <small class="text-muted">Members</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3 col-6 mb-3">
                    <div class="card stat-card border-0 shadow-sm">
                        <div class="card-body d-flex align-items-center">
                            <div class="stat-icon bg-success-subtle text-success me-3">
                                <i class="bi bi-circle-fill"></i>
                            </div>
                            <div>
                                <h4 class="mb-0" id="online-count">0</h4>
                                <small class="text-muted">Online</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search & Filters -->
            <div class="row mb-4">
                <div class="col-12">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="row align-items-center g-3">
                                <div class="col-md-8">
                                    <div class="search-box">
                                        <i class="bi bi-search"></i>
                                        <input type="text" class="form-control" id="team-search" placeholder="Search team members...">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <select class="form-select" id="role-filter">
                                        <option value="">All Roles</option>
                                        <option value="admin">Admin</option>
                                        <option value="member">Member</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Team Grid -->
            <div class="row" id="team-container">
                <!-- Dynamically populated by JS -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state d-none">
                <div class="empty-state-icon">
                    <i class="bi bi-people"></i>
                </div>
                <h4>No Team Members</h4>
                <p>Your team list is currently empty.</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/team.js"></script>
    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('show');
            document.getElementById('mobile-overlay').classList.toggle('show');
        }
    </script>
</body>
</html>
